<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <meta name="description" content="A highly portable, secure, local-first browser startpage.">
    <style>
        :root {
            --bg-color: #09090b;
            --text-main: #fafafa;
            --text-muted: #a1a1aa;
            --surface-bg: rgba(24, 24, 27, 0.6);
            --surface-hover: rgba(39, 39, 42, 0.8);
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --accent-color: #818cf8;
            --accent-glow: rgba(129, 140, 248, 0.2);
            --delete-color: #ef4444;
            --delete-glow: rgba(239, 68, 68, 0.2);
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(129, 140, 248, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(192, 132, 252, 0.04), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            box-sizing: border-box;
            animation: slide-up-fade 0.8s ease-out forwards;
        }

        @keyframes slide-up-fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-container {
            margin-bottom: 4rem;
            width: 100%;
        }

        .search-form {
            display: flex;
            align-items: center;
            background-color: var(--surface-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-subtle);
            border-radius: 9999px;
            padding: 0.5rem 0.75rem;
            box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.5);
            transition: var(--transition-smooth);
        }

        .search-form:focus-within {
            border-color: rgba(129, 140, 248, 0.5);
            box-shadow: 0 0 0 2px var(--accent-glow), 0 10px 30px -5px rgba(0, 0, 0, 0.6);
            background-color: rgba(24, 24, 27, 0.85);
            transform: translateY(-2px);
        }

        .search-engine-select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-engine-select-wrapper::after {
            content: '';
            position: absolute;
            right: 14px;
            width: 0; height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid var(--text-muted);
            pointer-events: none;
        }

        .search-engine-select {
            background-color: transparent;
            color: var(--text-main);
            border: none;
            padding: 0.5rem 2.2rem 0.5rem 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-engine-select option {
            background-color: #18181b;
            color: var(--text-main);
        }

        .search-input {
            flex-grow: 1;
            background-color: transparent;
            border: none;
            color: var(--text-main);
            padding: 0.75rem 1.25rem;
            font-size: 1.1rem;
            outline: none;
            width: 100%;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .search-button {
            background-color: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.5rem;
            margin-right: 0.25rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .search-button:hover { color: var(--accent-color); }

        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .bookmark-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            background-color: var(--surface-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1.5rem 1rem;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            opacity: 0;
        }

        .bookmark-card:hover {
            background-color: var(--surface-hover);
            border-color: var(--border-highlight);
            transform: translateY(-6px);
        }

        /* Continuous Delete Mode Visual Indication */
        body.delete-mode .bookmark-card {
            cursor: pointer;
            border-color: rgba(239, 68, 68, 0.3);
            animation: jitter 0.25s ease-in-out infinite alternate !important;
            opacity: 1 !important;
        }

        body.delete-mode .bookmark-card:hover {
            background-color: rgba(239, 68, 68, 0.15);
            border-color: var(--delete-color);
            box-shadow: 0 0 15px var(--delete-glow);
            transform: scale(0.96);
        }

        @keyframes jitter {
            0% { transform: rotate(-0.7deg) translateY(0px); }
            100% { transform: rotate(0.7deg) translateY(-0.5px); }
        }

        .bookmark-icon-wrapper {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            background-color: #27272a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 4px 10px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .bookmark-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .bookmark-fallback {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
        }

        .bookmark-name {
            font-size: 0.9rem;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            color: var(--text-muted);
        }

        #loader {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { color: #ef4444; }

        .management-overlay {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #18181b;
            border: 1px solid var(--border-highlight);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            width: 280px;
        }
        .management-overlay h3 { margin: 0 0 2px 0; font-size: 14px; color: var(--delete-color); font-weight: 700; letter-spacing: 0.03em; }
        .management-overlay p { margin: 0 0 6px 0; font-size: 11px; color: var(--text-muted); }
        
        .management-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .management-overlay input {
            background: #27272a;
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .management-overlay button {
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .management-overlay button:hover { background: #6366f1; }
    </style>
</head>
<body>

    <main class="container">
        <div class="search-container">
            <form id="search-form" class="search-form">
                <div class="search-engine-select-wrapper">
                    <select id="search-engine-select" class="search-engine-select">
                        <option value="duckduckgo">DuckDuckGo</option>
                        <option value="google">Google</option>
                    </select>
                </div>
                <input type="text" id="search-input" class="search-input" placeholder="Search the web..." autocomplete="off" autofocus>
                <button type="submit" class="search-button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </form>
        </div>
        
        <div id="loader"><div class="spinner"></div><span>Loading configuration...</span></div>
        <div id="bookmarks-grid" class="bookmarks-grid"></div>
    </main>

    <div id="management-panel" class="management-overlay">
        <h3>Edit Mode Active</h3>
        <p>Press Enter to add / Click cards to delete</p>
        
        <form id="add-shortcut-form" class="management-form" onsubmit="return false;">
            <input type="text" id="new-site-name" placeholder="Name (e.g. GitHub)" autocomplete="off" required>
            <input type="text" id="new-site-url" placeholder="URL (https://github.com)" autocomplete="off" required>
            <button type="submit" id="save-site-btn">Add Shortcut</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
