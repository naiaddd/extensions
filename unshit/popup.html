<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --line: #262b35;
    --text: #e7eaf0;
    --muted: #8b93a3;
    --accent: #ff3b30;
    --accent-soft: rgba(255, 59, 48, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 320px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 16px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 12px;
    margin-bottom: 14px;
  }
  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    align-self: center;
    box-shadow: 0 0 8px var(--accent);
  }

  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .row { display: flex; align-items: center; gap: 8px; }

  input[type="number"], textarea {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
  }
  input[type="number"] { width: 80px; }
  textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); }

  .unit { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); }

  .check {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 12px; color: var(--text);
    text-transform: none; letter-spacing: 0;
  }
  .check input { accent-color: var(--accent); width: 15px; height: 15px; }

  .hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; }

  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: transform 0.05s ease, background 0.15s ease;
  }
  button:hover { background: #ff5246; }
  button:active { transform: scale(0.985); }

  #status {
    text-align: center; font-size: 11px; color: var(--accent);
    height: 14px; margin-top: 8px; opacity: 0;
    transition: opacity 0.2s ease;
    font-family: 'Space Mono', monospace;
  }
  #status.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>YT DECLUTTER</h1>
  </header>

  <div class="field">
    <label for="minutes">Minimum length</label>
    <div class="row">
      <input type="number" id="minutes" min="0" step="1" value="0" />
      <span class="unit">minutes (0 = off)</span>
    </div>
    <p class="hint">Hides any video shorter than this.</p>
  </div>

  <div class="field">
    <label class="check">
      <input type="checkbox" id="hideUnknown" />
      Hide live / premieres / no-duration cards
    </label>
  </div>

  <div class="field">
    <label class="check">
      <input type="checkbox" id="listMode" />
      List view (single-column grid)
    </label>
  </div>

  <div class="field" id="textOnlyField" style="padding-left: 23px;">
    <label class="check">
      <input type="checkbox" id="listTextOnly" />
      Text only (hide thumbnails)
    </label>
  </div>

  <div class="field" id="avatarsField" style="padding-left: 23px;">
    <label class="check">
      <input type="checkbox" id="listHideAvatars" />
      Hide creator avatars
    </label>
  </div>

  <div class="field" id="lowercaseField" style="padding-left: 23px;">
    <label class="check">
      <input type="checkbox" id="listLowercase" />
      Lowercase all text
    </label>
  </div>

  <div class="field">
    <label for="blocked">Blocked creators</label>
    <textarea id="blocked" placeholder="One per line:&#10;@mrbeast&#10;Some Channel Name"></textarea>
    <p class="hint">Matches the channel name or @handle. One per line.</p>
  </div>

  <button id="save">SAVE</button>
  <div id="status">saved ✓</div>

  <script src="popup.js"></script>
</body>
</html>
